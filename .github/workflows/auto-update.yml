name: Release Processor

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          gh release download "${{ github.event.release.tag_name }}" \
            --dir assets

      - name: Find IPA
        run: |
          IPA=$(find assets -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "No IPA found"
            exit 1
          fi

          echo "IPA_PATH=$IPA" >> $GITHUB_ENV

      - name: Extract IPA
        run: |
          mkdir extracted
          unzip -q "$IPA_PATH" -d extracted

      - name: Read Metadata
        run: |
          APP_DIR=$(find extracted/Payload -maxdepth 1 -name "*.app" | head -n 1)

          APP_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$APP_DIR/Info.plist" 2>/dev/null || true)

          if [ -z "$APP_NAME" ]; then
            APP_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleName" "$APP_DIR/Info.plist")
          fi

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_DIR/Info.plist")
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_DIR/Info.plist")

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "App Name: $APP_NAME"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Version: $VERSION"
