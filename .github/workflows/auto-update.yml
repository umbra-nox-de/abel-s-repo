name: Release Processor

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libplist-utils jq

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          gh release download "${{ github.event.release.tag_name }}" \
            --dir assets

      - name: Find IPA
        run: |
          IPA=$(find assets -name "*.ipa" | head -n 1)

          if [ -z "$IPA" ]; then
            echo "No IPA found"
            exit 1
          fi

          echo "IPA_PATH=$IPA" >> $GITHUB_ENV

      - name: Extract IPA
        run: |
          mkdir -p extracted
          unzip -q "$IPA_PATH" -d extracted

      - name: Find App Bundle
        run: |
          APP_DIR=$(find extracted/Payload -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_DIR" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Read Metadata
        run: |
          plistutil -i "$APP_DIR/Info.plist" -f json -o info.json

          APP_NAME=$(jq -r '.CFBundleDisplayName // .CFBundleName // "Unknown"' info.json)
          BUNDLE_ID=$(jq -r '.CFBundleIdentifier // "Unknown"' info.json)
          VERSION=$(jq -r '.CFBundleShortVersionString // .CFBundleVersion // "Unknown"' info.json)

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Ensure apps.json Exists
        run: |
          if [ ! -f apps.json ]; then
            cat > apps.json <<'EOF'
          {
            "name": "Abel's Repo",
            "identifier": "com.umbra.repo",
            "apps": []
          }
          EOF
          fi

      - name: Update apps.json
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/$(basename "$IPA_PATH")"

          ICON_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/icons/default.png"

          jq \
            --arg bundle "$BUNDLE_ID" \
            '.apps |= map(select(.bundleIdentifier != $bundle))' \
            apps.json > tmp.json

          mv tmp.json apps.json

          jq \
            --arg name "$APP_NAME" \
            --arg bundle "$BUNDLE_ID" \
            --arg version "$VERSION" \
            --arg date "$(date +%F)" \
            --arg download "$DOWNLOAD_URL" \
            --arg icon "$ICON_URL" \
            '
            .apps += [{
              name: $name,
              bundleIdentifier: $bundle,
              developerName: "Abel",
              version: $version,
              versionDate: $date,
              downloadURL: $download,
              localizedDescription: ($name + " IPA"),
              iconURL: $icon
            }]
            ' apps.json > tmp.json

          mv tmp.json apps.json

      - name: Commit Changes
        env:
          BRANCH_NAME: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update app catalog"

          git push origin HEAD:$BRANCH_NAME
