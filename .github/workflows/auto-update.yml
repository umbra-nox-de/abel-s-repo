name: Release Processor

on:
  release:
    types: [published]

jobs:
  release-info:
    runs-on: ubuntu-latest

    steps:
      - name: Show Release Information
        run: |
          echo "Release Name: ${{ github.event.release.name }}"
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Release URL: ${{ github.event.release.html_url }}"
