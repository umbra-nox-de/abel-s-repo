name: Release Processor

on:
  release:
    types: [published]

jobs:
  release-info:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets

          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --dir assets

          echo "Downloaded files:"
          ls -la assets

      - name: Find IPA
        run: |
          IPA=$(find assets -name "*.ipa" | head -n 1)

          echo "IPA FOUND:"
          echo "$IPA"

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Extract IPA
        run: |
          IPA=$(find assets -name "*.ipa" | head -n 1)

          mkdir extracted

          unzip -q "$IPA" -d extracted

          echo "=== PAYLOAD ==="
          find extracted/Payload -type d | head -20

      - name: Read App Metadata
        run: |
          APP=$(find extracted/Payload -name "*.app" | head -n 1)

          echo "APP FOLDER:"
          echo "$APP"

          echo ""
          echo "INFO.PLIST FILE:"
          find "$APP" -name "Info.plist"
